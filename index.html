<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi Ki Doğdun Sevgilim!</title>
    <style>
        /* Modern ve Tatlı Tasarım */
        body { background-color: #fff5f8; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: #d81b60; }
        .container { text-align: center; transition: all 1s ease; }
        
        /* Pasta ve Mum */
        .cake { font-size: 100px; position: relative; cursor: pointer; user-select: none; }
        .candle { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 40px; }
        .flame { animation: flicker 0.6s infinite alternate; }
        
        @keyframes flicker {
            from { opacity: 0.8; transform: scale(1); }
            to { opacity: 1; transform: scale(1.1) translateY(-5px); }
        }

        /* Not Bölümü */
        #message { display: none; padding: 30px; max-width: 400px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); animation: pop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        h1 { margin-top: 0; }
        p { line-height: 1.6; font-size: 1.2em; color: #555; }
        
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .hint { font-size: 0.9em; color: #ad1457; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="cake-section" class="container">
        <p class="hint">Dileğini tut ve muma dokun! ✨</p>
        <div class="cake" onclick="makeWish()">
            <div class="candle" id="flame-container"><span class="flame">🔥</span></div>
            🎂
        </div>
    </div>

    <div id="message">
        <h1>İyi Ki Doğdun! ❤️</h1>
        <p>Sana senin kadar mzel bir hediye.İyi ki varsın iyi ki hayatımdasın . Seni çok seviyorum</p>
        </div>

    <script>
        function makeWish() {
            // Mumu söndür
            document.getElementById('flame-container').innerHTML = "💨";
            
            // 1 saniye sonra mesajı göster
            setTimeout(() => {
                document.getElementById('cake-section').style.display = 'none';
                document.getElementById('message').style.display = 'block';
                document.body.style.backgroundColor = "#fce4ec";
                createHearts();
            }, 800);
        }

        // Basit bir kalp efekti
        function createHearts() {
            for(let i=0; i<20; i++) {
                let heart = document.createElement('div');
                heart.innerHTML = "❤️";
                heart.style.position = "fixed";
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.top = "100vh";
                heart.style.fontSize = Math.random() * 20 + 20 + "px";
                heart.style.transition = "all 3s linear";
                document.body.appendChild(heart);
                
                setTimeout(() => {
                    heart.style.top = "-10vh";
                    heart.style.opacity = "0";
                }, 100);
            }
        }
    </script>
</body>
</html>
